{% set name = "netcdf4" %}
{% set version = "1.7.4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/Unidata/{{ name }}-python/archive/v{{version}}rel.tar.gz
  sha256: c792977eb762fd29fa46b78f44dd8c15729fe7733c2cd2ecd34552089734ce4b
  patches:  # [win]
    - patches/00_fix_win_test.patch  # [win]

build:
  number: 0
  skip: True  # [py<310]
  entry_points:
    - ncinfo = netCDF4.utils:ncinfo
    - nc4tonc3 = netCDF4.utils:nc4tonc3
    - nc3tonc4 = netCDF4.utils:nc3tonc4
  ignore_run_exports:
    - hdf5
    - numpy

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
  host:
    - python
    - pip
    - cython >=0.29
    - numpy {{ numpy }}
    - setuptools >=77.0.1
    - setuptools-scm >=3.4
    - hdf5 {{ hdf5 }}
    - libnetcdf {{ libnetcdf }}
  run:
    - python
    - cftime
    - certifi
    - numpy
    - hdf5
    - libnetcdf

test:
  source_files:
    - test
  imports: 
    - netCDF4
    - cftime
  requires:
    - pip
    - cython
    - packaging
    - pytest
  commands:
    - pip check
    - ncinfo -h
    - nc4tonc3 -h
    - nc3tonc4 -h
    - cd test && python run_all.py

about:
  home: https://unidata.github.io/netcdf4-python
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: netcdf4-python is a Python interface to the netCDF C library.
  description: |
    netCDF version 4 has many features not found in earlier versions of the library and is 
    implemented on top of HDF5. This module can read and write files in both the new netCDF 4 
    and the old netCDF 3 format, and can create files that are readable by HDF5 clients. 
    The API modelled after Scientific.IO.NetCDF, and should be familiar to users of that module.
  dev_url: https://github.com/Unidata/netcdf4-python
  doc_url: https://unidata.github.io/netcdf4-python

extra:
  recipe-maintainers:
    - ocefpaf
    - pelson
    - dopplershift
    - xylar
